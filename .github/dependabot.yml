version: 2
updates:
  # Python runtime + dev dependencies (declared in pyproject.toml)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      # Group lint / type / test tooling so they don't fragment into many PRs.
      dev-tooling:
        patterns:
          - "ruff*"
          - "mypy*"
          - "pytest*"
          - "hypothesis*"
          - "pre-commit*"

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
