[[dependency]]
name = "anthropic"
version = "0.97"
verified_date = "2026-05-03"
verified_via = "https://github.com/anthropics/anthropic-sdk-python"
methods_used = [
    "Anthropic",
    "client.messages.create",
    "messages.create kwargs: model, max_tokens, tools, tool_choice, system, messages",
    "response.content[i].type",
    "response.content[i].input",
    "response.usage.input_tokens",
    "response.usage.output_tokens",
    "response.usage.cache_creation_input_tokens",
    "response.usage.cache_read_input_tokens",
    "client.messages.batches.create",
]
notes = """
Model: claude-sonnet-4-6 (vision + prompt caching, price/perf sweet spot for Pass 2b).
Caching: cache_control={type:'ephemeral'} on system block, 5-min TTL (default since 2026-03-06).
Max 4 cache_control breakpoints per request; Comicast uses 1 (end of static system block).
Image content block: {type:'image', source:{type:'base64', media_type:'image/png', data:<b64>}}.
Per-image limits: 5 MB payload, 8000 px per dimension (2000 px for multi-image batches).
Structured output: strict tool use via tools=[record_page] + tool_choice={type:'tool',name:'record_page'}.
tools (input_schema, not parameters) sit before system in cache prefix; cached automatically.
Min cacheable threshold: docs say 1024 tokens; anthropic-sdk-python#1194 reports occasional 2048.
response.usage source: https://github.com/anthropics/anthropic-sdk-python README (verified 2026-05-02).
SDK 0.97 released 2026-04-23; verified via https://pypi.org/project/anthropic/ (2026-05-03).
"""

